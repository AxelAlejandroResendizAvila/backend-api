<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Búsqueda de Productos</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Modal de Login -->
    <div class="login-modal" id="loginModal">
        <div class="login-box">
            <h2>🔐 Iniciar Sesión</h2>
            <p style="color: #666; margin-bottom: 20px;">Ingresa tus credenciales para acceder</p>
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" required autocomplete="current-password">
                </div>
                <div id="loginError" class="login-error"></div>
                <button type="submit" id="loginBtn">Iniciar Sesión</button>
            </form>
        </div>
    </div>

    <div class="container" id="mainContainer" style="display: none;">
        <div class="header-bar">
            <h1>🔍 Búsqueda de Productos</h1>
            <button id="logoutBtn" class="logout-btn">Cerrar Sesión</button>
        </div>
        
        <div class="search-container">
            <input 
                type="text" 
                id="searchInput" 
                placeholder="Buscar productos por nombre o descripción..."
                autocomplete="off"
            >
            <button id="clearBtn" disabled>Limpiar Búsqueda</button>
        </div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Buscando...</p>
        </div>

        <div class="no-results" id="noResults">
            <div class="no-results-icon">🔍❌</div>
            <p>No encontramos productos que coincidan con <strong class="highlight" id="searchTerm"></strong></p>
            <p style="margin-top: 10px; font-size: 0.9em; color: #999;">Intenta con otros términos de búsqueda</p>
        </div>

        <div class="stats" id="stats"></div>

        <table id="productTable">
            <thead>
                <tr>
                    <th>NOMBRE</th>
                    <th>DESCRIPCIÓN</th>
                    <th>CATEGORÍA</th>
                    <th>PRECIO</th>
                    <th>STOCK</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                <!-- Los productos se cargarán aquí -->
            </tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
